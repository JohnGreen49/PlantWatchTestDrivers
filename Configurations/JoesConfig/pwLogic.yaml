      resultVariableArrayStartIndex: 1
      resultVariableArrayLengthType: Constant
      resultVariableArrayLength: 1
      fileSpecPathType: Constant
      fileSpecPath: _const_C:\PlantWatchConfig\SolutionData\Config Files\
      fileSpecFilenameType: Constant
      fileSpecFilename: _const_PartNumbers
      fileSpecFileExtensionType: Constant
      fileSpecFileExtension: _const_txt
