      source2Type: Constant
      operator: SetVariableToValue
      variable: Status
  - action:
      actionType: Math
      sourceType: Constant
      source: Grey
      source2Type: Constant
      operator: SetVariableToValue
      variable: DefectButtonBGColor
  - action:
      actionType: Math
      sourceType: Constant
      source: 0
      source2Type: Constant
      operator: SetVariableToValue
      variable: GoodPartCount
  - action:
      actionType: Math
      sourceType: Constant
      source: 0
      source2Type: Constant
      operator: SetVariableToValue
      variable: BadPartCount
- name: MarkPartButtonLogicChart
  station: ABCStation
  associatedDeviceName: GuiLogicChartHolder
  controlCharsEnabled: false
  steps:
  - action:
      actionType: If
      sourceType: Constant
      source: COLOR_Grey
      compareOperator: <>
      containsStartPositionVariable: ActiveScreenName
      containsInstanceCountVariable: ActiveScreenName
      comparedToType: Variable
      comparedTo: MarkPartButtonBGColor
  - action:
      actionType: If
      sourceType: Variable
      source: _TimeStamp
      compareOperator: =
      containsStartPositionVariable: ActiveScreenName
      containsInstanceCountVariable: ActiveScreenName
      comparedToType: Constant
      comparedTo: ZERO
  - action:
      actionType: Math
      sourceType: Constant
      source: MSG_CreatingMarkFiles
      operator: SetVariableToValue
      variable: MSG_UserMessage
      clearStartIndex: 1
      clearLength: 1
  - action:
      actionType: ActionWriteToFile
      valueType: Variable
      value: PartNumber
      append: No
      fileSpecPathType: Constant
      fileSpecPath: DIR_MarkFilesFolder
      fileSpecFilenameType: Constant
      fileSpecFilename: MarkFileName
      fileSpecFileExtensionType: Constant
      fileSpecFileExtension: .MD
      addCrLf: Yes
  - action:
      actionType: FileManager
      sourceType: Constant
      source: DIR_MarkFilesFolder
      sourceSuffixType: Constant
      sourceSuffix: _const__const__const_.HR
      operator: CheckForExistance
      dirSearchPattern: '*.*'
      statusVariable: FileOperationStatus
      resultVariableType: Variable
      resultVariable: Garbage
      resultVariableArrayStartIndexType: Constant
      resultVariableArrayStartIndex: 1
      resultVariableArrayLengthType: Constant
      resultVariableArrayLength: 1
  - action:
      actionType: If
      sourceType: Variable
      source: FileOperationStatus
      compareOperator: =
      containsStartPositionVariable: ActiveScreenName
      containsInstanceCountVariable: ActiveScreenName
      comparedToType: Constant
      comparedTo: FILE_SUCCESS
  - action:
      actionType: FileManager
      sourcePrefixType: Constant
      sourcePrefix: C:\PlantWatchConfig\SolutionData\MarkFiles\
      sourceType: Variable
      source: UID
      sourceSuffixType: Constant
      sourceSuffix: .MD
      destPrefixType: Constant
      destType: Constant
      destSuffixType: Constant
      operator: CheckForExistance
      statusVariable: FileOperationStatus
      resultVariableType: Variable
      resultVariable: Garbage
      resultVariableArrayStartIndexType: Constant
      resultVariableArrayStartIndex: 1
      resultVariableArrayLengthType: Constant
      resultVariableArrayLength: 1
  - action:
      actionType: If
      sourceType: Variable
      source: FileOperationStatus
      compareOperator: =
      containsStartPositionVariable: ActiveScreenName
      containsInstanceCountVariable: ActiveScreenName
      comparedToType: Constant
      comparedTo: _const_Pass
  - action:
      actionType: Math
      sourceType: Constant
      source: _const_Mark Files Created....
      operator: IncrementAsNumber
      variable: PartCount
      clearStartIndex: 1
      clearLength: 1
- name: RecordDefectButtonLogicChart
  station: ABCStation
  associatedDeviceName: GuiLogicChartHolder
  controlCharsEnabled: false
  steps:
  - action:
      actionType: If
      sourceType: Variable
      source: VerifiedScannedPartNumber
      compareOperator: =
      comparedToType: Constant
      comparedTo: Part Type Verified
  - action:
      actionType: If
      sourceType: Variable
      source: MarkPartButtonBGColor
      compareOperator: <>
      comparedToType: Constant
      comparedTo: LawnGreen
  - action:
      actionType: Math
      sourceType: Variable
      source: SelectedDefect
      source2Type: Constant
      operator: SetVariableToValue
      variable: DefectString
  - action:
      actionType: If
      sourceType: Variable
      source: ItemEventID
      compareOperator: <>
      comparedToType: Constant
      comparedTo: 0
  - action:
      actionType: If
      sourceType: Variable
      source: SelectedDefect
      compareOperator: <>
      comparedToType: Constant
      comparedTo: 0
  - action:
      actionType: StoredProcedure
      databaseConnection: MyDatabase
      procedureName: usp_InsertItemEventAttr
      status: SQLResults
      inputs:
      - name: '@ItemEventID'
        dataSourceType: Variable
        dataSource: ItemEventID
        dataType: String
        dataLength: 30
      - name: '@AttName'
        dataSourceType: Constant
        dataSource: Defect
        dataType: String
        dataLength: 30
      - name: '@AttValue'
        dataSourceType: Variable
        dataSource: SelectedDefect
        dataType: String
        dataLength: 60
      results: []
  - action:
      actionType: ActionWriteToFile
      valueType: Variable
      value: DefectString
      append: Yes
      fileSpecPathType: Constant
      fileSpecPath: C:\PlantWatchConfig\SolutionData\DefecttData\
      fileSpecFilenameType: Constant
      fileSpecFilename: DefectDB
      fileSpecFileExtensionType: Constant
      fileSpecFileExtension: txt
      addCrLf: Yes
  - action:
      actionType: Math
      sourceType: Constant
      source: Grey
      source2Type: Constant
      operator: SetVariableToValue
      variable: DefectButtonBGColor
  - action:
      actionType: Math
      sourceType: Constant
      source: Scan Part Number
      source2Type: Constant
      operator: SetVariableToValue
      variable: Status
