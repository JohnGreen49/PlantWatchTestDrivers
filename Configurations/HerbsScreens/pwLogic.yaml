- name: ZebraComPortLogicChart
  station: ABCStation
  associatedDeviceName: ZebraPrinterSocket
  controlCharsEnabled: false
  steps:
  - action:
      actionType: PrintBarcode
      printerName: Zebra G120 Barcode Printer
      fields:
      - fieldName: Box
        fieldType: Box
        positionX: 10
        positionY: 10
        sourceType: Variable
        source: Scanner Data
        boxWidth: 25
        boxHeight: 25
        boxLineThickness: 5
        boxLineColor: Black
        boxCornerRoundness: ' 0'
      - fieldName: DM
        fieldType: Data Matrix
        positionX: 20
        positionY: 20
        sourceType: Variable
        source: Scanner Data
        dMXOrientation: Normal
        dMXCellHeight: 30
        dMXECC: 0
        dMXColumns: 4
        dMXRows: 4
        dMXCharSet: Uppercase Alphanumeric + space , period, comma, dash, and slash
        dMXAspectRatio: Square
