      comparedTo: VerifiedScannedPartNumber
  - action:
      actionType: Math
      sourceType: Constant
      source: Loading Marking Data.....
      source2Type: Constant
      operator: SetVariableToValue
      variable: Status
  - action:
      actionType: ActionWriteToDevice
      prefixType: Constant
      sourceType: Variable
      source: MarkDataString
      suffixType: Constant
