- name: FixedMountReaderLogic
  station: ABCStation
  associatedDeviceName: FixedMountREader
  controlCharsEnabled: false
  steps:
  - action:
      actionType: Math
      sourceType: Device
      source2Type: Constant
      operator: SetVariableToValue
      variable: Reader Data
  - action:
      actionType: Math
      sourceType: Constant
      source: 'Fixed Mount Reader = '
      source2Type: Variable
      source2: Reader Data
      operator: Add2StringsToEnd
      variable: Status
  - action:
      actionType: If
      sourceType: Variable
      source: Garbage
      compareOperator: =
      containsInstanceCountVariable: Combo1
      comparedToType: Variable
      comparedTo: Garbage
  - action:
      actionType: Math
      sourceType: Variable
      source: GoodPartCount
      source2Type: Constant
      source2: 1
      operator: AddAsNumbers
      variable: GoodPartCount
- name: InitializationThreadLogix
  station: ABCStation
  associatedDeviceName: InitializationThread
  controlCharsEnabled: false
  steps:
  - action:
      actionType: If
      sourceType: Variable
      source: Initialize
      compareOperator: =
      containsInstanceCountVariable: Combo1
      comparedToType: Constant
      comparedTo: 0
  - action:
      actionType: Math
      sourceType: Constant
      source: 1
      source2Type: Constant
      operator: SetVariableToValue
      variable: Initialize
  - action:
      actionType: ActionReadFromFile
      resultVariableType: Array
      resultVariable: OperatorArray
      resultVariableArrayStartIndexType: Constant
      resultVariableArrayStartIndex: 1
      resultVariableArrayLengthType: AllRecords
      fileSpecPathType: Constant
      fileSpecPath: C:\PlantWatchConfig\SolutionData\
      fileSpecFilenameType: Constant
      fileSpecFilename: Operators
      fileSpecFileExtensionType: Constant
      fileSpecFileExtension: txt
  - action:
      actionType: ActionReadFromFile
      resultVariableType: Array
      resultVariable: PartNumberArray
      resultVariableArrayStartIndexType: Constant
      resultVariableArrayStartIndex: 1
      resultVariableArrayLengthType: AllRecords
      fileSpecPathType: Constant
      fileSpecPath: C:\PlantWatchConfig\SolutionData\
      fileSpecFilenameType: Constant
      fileSpecFilename: PartNumbers
      fileSpecFileExtensionType: Constant
      fileSpecFileExtension: txt
  - action:
      actionType: ActionReadFromFile
      resultVariableType: Array
      resultVariable: DefectArray
      resultVariableArrayStartIndexType: Constant
      resultVariableArrayStartIndex: 1
      resultVariableArrayLengthType: Constant
      resultVariableArrayLength: 5
      fileSpecPathType: Constant
      fileSpecPath: C:\PlantWatchConfig\SolutionData\
      fileSpecFilenameType: Constant
      fileSpecFilename: Defects
      fileSpecFileExtensionType: Constant
      fileSpecFileExtension: txt
  - action:
      actionType: Math
      sourceType: Constant
      source: Select an Operator
      source2Type: Constant
      operator: SetVariableToValue
      variable: Status
  - action:
      actionType: Math
      sourceType: Constant
      source: Grey
      source2Type: Constant
      operator: SetVariableToValue
      variable: MarkPartButtonBGColor
  - action:
      actionType: Math
      sourceType: Constant
      source: Grey
      source2Type: Constant
      operator: SetVariableToValue
      variable: PrintLabelButtonBGColor
