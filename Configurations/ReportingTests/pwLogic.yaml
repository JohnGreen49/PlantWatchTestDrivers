- name: PartCounter_Logic
  description: Increment Part count and publish
  associatedDeviceName: PartCounter
  controlCharsEnabled: false
- name: PartGenerator_Publish_Count
  associatedDeviceName: PartGenerator
  controlCharsEnabled: false
  steps:
  - action:
      actionType: Math
      operator: IncrementAsNumber
      variable: PartCounter
      clearStartIndex: 1
      clearLength: 1
  - action:
      actionType: PublishMqtt
      topicType: Variable
      topic: PartCounterTopic
      payloadType: Variable
      payload: PartCounter
      qualityOfService: 0
- name: RatePublisher_ComputeRate
  associatedDeviceName: RatePublisher
  controlCharsEnabled: false
  steps:
  - action:
      actionType: Math
      sourceType: Variable
      source: PartCounter
      source2Type: Variable
      source2: PreviousPartCount
      operator: SubtractFromVariableAsNumber
      variable: CounttDifference
      clearStartIndex: 1
      clearLength: 1
  - action:
      actionType: Math
      sourceType: Variable
      source: PartCounter
      operator: SetVariableToValue
      variable: PreviousPartCount
      clearStartIndex: 1
      clearLength: 1
  - action:
      actionType: Math
      sourceType: Variable
      source: CounttDifference
      source2Type: Variable
      source2: SIX
      operator: DevideAsNumber
      variable: PartRate
      clearStartIndex: 1
      clearLength: 1
  - action:
      actionType: Math
      sourceType: Variable
      source: PartRate
      operator: TruncateTo2DecimalPlaces
      variable: PartRateOutput
      clearStartIndex: 1
      clearLength: 1
  - action:
      actionType: PublishMqtt
      topicType: Variable
      topic: PartRateTopic
      payloadType: Variable
      payload: PartRateOutput
      qualityOfService: 0
- name: SendPartBirthToDB
  description: Send the birth of a part event to the DB
  associatedDeviceName: PartGenerator
  controlCharsEnabled: false
  steps:
  - action:
      actionType: Math
      sourceType: Device
      operator: SetVariableToValue
      variable: ItemID
      clearStartIndex: 1
      clearLength: 1
  - action:
      actionType: Math
      sourceType: Constant
      source: HTE Prefix
      operator: AddStringToBegining
      variable: ItemID
      clearStartIndex: 1
      clearLength: 1
  - action:
      actionType: StoredProcedure
      databaseConnection: LoclaDB
      procedureName: dbo.usp_InsertItemParts
      inputs:
      - name: '@ItemID'
        dataSourceType: Variable
        dataSource: ItemID
        dataType: String
        dataLength: 50
      - name: '@PartType'
        dataSourceType: Constant
        dataSource: PART_OPENER
        dataType: String
        dataLength: 50
      results: []
  - action:
      actionType: StoredProcedure
      databaseConnection: LoclaDB
      procedureName: dbo.usp_InsertItemEvent
      inputs:
      - name: '@ItemID'
        dataSourceType: Variable
        dataSource: ItemID
        dataType: String
        dataLength: 50
      - name: '@EventType'
        dataSourceType: Constant
        dataSource: BIRTH_EVENT
        dataType: String
        dataLength: 50
      - name: '@Station'
        dataSourceType: Constant
        dataSource: STATION_ONE
        dataType: String
        dataLength: 100
      results: []
- name: Timer for FixedScanner_Logic
  description: Timer for FixedScanner_Logic
  associatedDeviceName: Timer for FixedScanner
  controlCharsEnabled: false
  steps:
  - action:
      actionType: ActionWriteToDevice
      prefixType: Variable
      prefix: LESS_THAN
      sourceType: Variable
      source: FixedScanner_Trigger
      suffixType: Variable
      suffix: GREATER_THAN
      addCrLf: No
      device: FixedScanner1
