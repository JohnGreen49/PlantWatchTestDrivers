- name: PartCounter_Logic
  description: Increment Part count and publish
  associatedDeviceName: PartCounter
  controlCharsEnabled: false
- name: PartGenerator_Publish_Count
  associatedDeviceName: PartGenerator
  controlCharsEnabled: false
  steps:
  - action:
      actionType: Math
      operator: IncrementAsNumber
      variable: PartCounter
      clearStartIndex: 1
      clearLength: 1
  - action:
      actionType: PublishMqtt
      topicType: Constant
      topic: PartCounterTopic
      payloadType: Variable
      payload: PartCounter
      qualityOfService: 0
- name: RatePublisher_ComputeRate
  associatedDeviceName: RatePublisher
  controlCharsEnabled: false
  steps:
  - action:
      actionType: Math
      sourceType: Variable
      source: PartCounter
      source2Type: Variable
      source2: PreviousPartCount
      operator: SubtractFromVariableAsNumber
      variable: CounttDifference
      clearStartIndex: 1
      clearLength: 1
  - action:
      actionType: Math
      sourceType: Variable
      source: PartCounter
      operator: SetVariableToValue
      variable: PreviousPartCount
      clearStartIndex: 1
      clearLength: 1
  - action:
      actionType: Math
      sourceType: Variable
      source: CounttDifference
      source2Type: Variable
      source2: SIX
      operator: DevideAsNumber
      variable: PartRate
      clearStartIndex: 1
      clearLength: 1
  - action:
      actionType: Math
      sourceType: Variable
      source: PartRate
      operator: TruncateTo2DecimalPlaces
      variable: PartRate
      clearStartIndex: 1
      clearLength: 1
  - action:
      actionType: PublishMqtt
      topicType: Variable
      topic: PartRateTopic
      payloadType: Variable
      payload: PartRate
      qualityOfService: 0
