- name: MarkPartButtonLogicChart
  station: ABCStation
  associatedDeviceName: Screen:Lead-Off Screen/CreatUID
  triggerMode: OnEvent
  controlCharsEnabled: false
  steps:
  - action:
      actionType: If
      sourceType: Constant
      source: Grey
      compareOperator: <>
      comparedToType: Variable
      comparedTo: MarkPartButtonBGColor
  - action:
      actionType: If
      sourceType: Constant
      source: Part Type Verified
      compareOperator: =
      comparedToType: Variable
      comparedTo: VerifiedScannedPartNumber
  - action:
      actionType: Math
      sourceType: Constant
      source: Creating Mark Files....
      source2Type: Constant
      operator: SetVariableToValue
      variable: Status
  - action:
      actionType: ActionWriteToFile
      valueType: Variable
      value: MarkDataString
      append: No
      fileSpecPathType: Constant
      fileSpecPath: C:\PlantWatchConfig\SolutionData\MarkFiles\
      fileSpecFilenameType: Variable
      fileSpecFilename: UID
      fileSpecFileExtensionType: Constant
      fileSpecFileExtension: .MD
      addCrLf: Yes
  - action:
      actionType: ActionWriteToFile
      valueType: Variable
      value: MarkDataString
      append: No
      fileSpecPathType: Constant
      fileSpecPath: C:\PlantWatchConfig\SolutionData\MarkFiles\
      fileSpecFilenameType: Variable
      fileSpecFilename: UID
      fileSpecFileExtensionType: Constant
      fileSpecFileExtension: .HR
      addCrLf: Yes
  - action:
      actionType: FileManager
      sourcePrefixType: Variable
      sourcePrefix: MARKFILE_FOLDER
      sourceType: Variable
      source: UID
      sourceSuffixType: Constant
      sourceSuffix: .HR
      operator: CheckForExistance
      dirSearchPattern: '*.*'
      statusVariable: FileOperationStatus
      resultVariableType: Variable
      resultVariable: Garbage
      resultVariableArrayStartIndexType: Constant
      resultVariableArrayStartIndex: 1
      resultVariableArrayLengthType: Constant
      resultVariableArrayLength: 1
  - action:
      actionType: If
      sourceType: Variable
      source: FileOperationStatus
      compareOperator: =
      comparedToType: Constant
      comparedTo: Pass
  - action:
      actionType: FileManager
      sourcePrefixType: Variable
      sourcePrefix: MARKFILE_FOLDER
      sourceType: Variable
      source: UID
      sourceSuffixType: Constant
      sourceSuffix: .MD
      operator: CheckForExistance
      dirSearchPattern: '*.*'
      statusVariable: FileOperationStatus
      resultVariableType: Variable
      resultVariable: Garbage
      resultVariableArrayStartIndexType: Constant
      resultVariableArrayStartIndex: 1
      resultVariableArrayLengthType: Constant
      resultVariableArrayLength: 1
  - action:
      actionType: If
      sourceType: Variable
      source: FileOperationStatus
      compareOperator: =
      comparedToType: Constant
      comparedTo: Pass
  - action:
      actionType: Math
      sourceType: Constant
      source: Mark Files Created....
      source2Type: Constant
      operator: SetVariableToValue
      variable: MessageStringTimed
  - action:
      actionType: StoredProcedure
      databaseConnection: HTE_DEMO1
      procedureName: usp_InsertItemParts
      status: SQLResults
      inputs:
      - name: '@PartType'
        dataSourceType: Variable
        dataSource: Scanner Data
        dataType: String
        dataLength: 30
      - name: '@ItemID'
        dataSourceType: Variable
        dataSource: UID
        dataType: String
        dataLength: 30
      - name: '@CreateTime'
        dataSourceType: Variable
        dataSource: FormattedTimeStamp
        dataType: String
        dataLength: 30
      results: []
  - action:
      actionType: If
      sourceType: Variable
      source: SQLResults
      compareOperator: =
      comparedToType: Constant
      comparedTo: 0
  - action:
      actionType: StoredProcedure
      databaseConnection: HTE_DEMO1
      procedureName: usp_InsertItemEvent
      status: SQLResults
      inputs:
      - name: '@ItemID'
        dataSourceType: Variable
        dataSource: UID
        dataType: String
        dataLength: 30
      - name: '@EventType'
        dataSourceType: Constant
        dataSource: Birth
        dataType: String
        dataLength: 30
      - name: '@Station'
        dataSourceType: Constant
        dataSource: Lead-Off
        dataType: String
        dataLength: 30
      - name: '@EventTime'
        dataSourceType: Variable
        dataSource: FormattedTimeStamp
        dataType: String
        dataLength: 30
      results:
      - name: '@ItemEventID'
        dataType: Numeric
        variable: ItemEventID
        resultKind: OutputParam
  - action:
      actionType: If
      sourceType: Variable
      source: SQLResults
      compareOperator: =
      comparedToType: Constant
      comparedTo: 0
  - action:
      actionType: StoredProcedure
      databaseConnection: HTE_DEMO1
      procedureName: usp_InsertItemEventAttr
      status: SQLResults
      inputs:
      - name: '@ItemEventID'
        dataSourceType: Variable
        dataSource: ItemEventID
        dataType: String
        dataLength: 30
      - name: '@AttName'
        dataSourceType: Constant
        dataSource: Operator
        dataType: String
        dataLength: 30
      - name: '@AttValue'
        dataSourceType: Variable
        dataSource: SelectedOperator
        dataType: String
        dataLength: 60
      results: []
  - action:
      actionType: If
      sourceType: Variable
      source: SQLResults
      compareOperator: =
      comparedToType: Constant
      comparedTo: 0
  - action:
      actionType: Math
      sourceType: Constant
      source: Grey
      source2Type: Constant
      operator: SetVariableToValue
      variable: MarkPartButtonBGColor
  - action:
      actionType: Math
      sourceType: Constant
      source: Scan Next Part
      source2Type: Constant
      operator: SetVariableToValue
      variable: MessageString
